services:
  - type: web
    name: mooddrift-api
    runtime: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_PUBLIC_KEY
        sync: false
      - key: VAPI_ASSISTANT_ID
        sync: false
      - key: DEFAULT_USER_ID
        value: demo_user
      - key: DRIFT_THRESHOLD
        value: "0.25"
      - key: RECENT_WINDOW_DAYS
        value: "7"
      - key: BASELINE_WINDOW_DAYS
        value: "30"
      - key: PYTHON_VERSION
        value: "3.11.0"
